# GitHub Actions workflow for npm projects using JFrog Artifactory with Secrets
#
# Use this workflow when OIDC is not available (non-Enterprise subscriptions).
#
# Prerequisites:
#   1. Create a GitHub secret named JFROG_URL with your JFrog Platform URL
#   2. Create a GitHub secret named JFROG_ACCESS_TOKEN with your JFrog access token
#
# Usage:
#   1. Copy this file to .github/workflows/jfrog-npm.yml
#   2. Replace {PROJECT_KEY} with your JFrog project key
#   3. Set up the required GitHub secrets (see github-secrets-setup.md)

name: Build and Publish npm Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  # Replace with your JFrog project key
  JF_PROJECT: "{PROJECT_KEY}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          # JFrog Platform URL from secret
          JF_URL: ${{ secrets.JFROG_URL }}
          # Access token from secret
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_ACCESS_TOKEN }}

      - name: Configure npm client
        run: |
          # Configure npm to use JFrog for dependency resolution and publishing
          jf npmc --repo-resolve ${{ env.JF_PROJECT }}-npm --repo-deploy ${{ env.JF_PROJECT }}-npm

      - name: Install dependencies
        run: jf npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on release
    if: github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JFROG_ACCESS_TOKEN }}

      - name: Configure npm client
        run: |
          jf npmc --repo-resolve ${{ env.JF_PROJECT }}-npm --repo-deploy ${{ env.JF_PROJECT }}-npm

      - name: Install dependencies
        run: jf npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish to JFrog
        run: |
          # Get version from release tag (removes 'v' prefix if present)
          VERSION=${GITHUB_REF_NAME#v}

          # Update package.json version
          npm version $VERSION --no-git-tag-version --allow-same-version

          # Publish to JFrog using JFrog CLI
          jf npm publish

      - name: Verify publication
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          echo "Verifying ${PACKAGE_NAME}@${VERSION} is available..."
          jf npm show "${PACKAGE_NAME}@${VERSION}" version
