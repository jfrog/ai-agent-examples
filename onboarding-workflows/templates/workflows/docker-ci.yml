name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JF_PROJECT: "{{PROJECT_KEY}}"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Authenticate Docker with Artifactory
        run: jf docker-login {{JFROG_HOSTNAME}}

      - name: Build Docker image
        run: |
          docker build \
            -t {{JFROG_HOSTNAME}}/{{PROJECT_KEY}}-docker-local/${{ github.event.repository.name }}:${{ github.sha }} \
            -t {{JFROG_HOSTNAME}}/{{PROJECT_KEY}}-docker-local/${{ github.event.repository.name }}:latest \
            .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          jf docker push {{JFROG_HOSTNAME}}/{{PROJECT_KEY}}-docker-local/${{ github.event.repository.name }}:${{ github.sha }}
          jf docker push {{JFROG_HOSTNAME}}/{{PROJECT_KEY}}-docker-local/${{ github.event.repository.name }}:latest

      - name: Scan Docker image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          jf docker scan {{JFROG_HOSTNAME}}/{{PROJECT_KEY}}-docker-local/${{ github.event.repository.name }}:${{ github.sha }}
