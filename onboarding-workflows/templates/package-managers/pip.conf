# JFrog Artifactory pip configuration
# Developers: replace {username} and {password} with your credentials,
# or set PIP_INDEX_URL environment variable
[global]
index-url = https://{username}:{password}@{{JFROG_HOSTNAME}}/artifactory/api/pypi/{{PROJECT_KEY}}-pypi/simple
trusted-host = {{JFROG_HOSTNAME}}
