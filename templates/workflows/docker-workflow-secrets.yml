# GitHub Actions workflow for Docker projects using JFrog Artifactory with Secrets
#
# This workflow uses vanilla docker commands (no JFrog CLI required).
# Use this workflow when OIDC is not available (non-Enterprise subscriptions).
#
# Prerequisites:
#   1. Create a GitHub secret named JFROG_URL with your JFrog Platform URL
#   2. Create a GitHub secret named JFROG_ACCESS_TOKEN with your JFrog access token
#   3. Create a GitHub secret named JFROG_USERNAME with your JFrog username
#
# Usage:
#   1. Copy this file to .github/workflows/jfrog-docker.yml
#   2. Replace {JFROG_HOST} with your JFrog hostname (e.g., mycompany.jfrog.io)
#   3. Replace {PROJECT_KEY} with your JFrog project key
#   4. Replace {IMAGE_NAME} with your image name
#   5. Set up the required GitHub secrets (see github-secrets-setup.md)

name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JFROG_HOST: "{JFROG_HOST}"
      PROJECT_KEY: "{PROJECT_KEY}"
      IMAGE_NAME: "{IMAGE_NAME}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate Docker with JFrog
        run: |
          echo "${{ secrets.JFROG_ACCESS_TOKEN }}" | docker login ${{ env.JFROG_HOST }} \
            --username ${{ secrets.JFROG_USERNAME }} \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.JFROG_HOST }}/${{ env.PROJECT_KEY }}-docker/${{ env.IMAGE_NAME }}:0.${{ github.run_number }} .

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.JFROG_HOST }}/${{ env.PROJECT_KEY }}-docker/${{ env.IMAGE_NAME }}:0.${{ github.run_number }}
